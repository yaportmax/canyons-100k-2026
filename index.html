<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Route · Canyons 100K 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<link rel="stylesheet" href="assets/styles.css" />
<style>
  body { overflow-x: hidden; }

  .page {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 59px);
    overflow: hidden;
  }

  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--paper);
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .sb-head {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    position: sticky; top: 0; z-index: 2;
  }
  .sb-head h1 {
    font-family: var(--serif); font-weight: 500;
    font-size: 22px; line-height: 1; letter-spacing: -0.02em;
    margin: 4px 0 2px;
  }
  .sb-head h1 em { font-style: italic; color: var(--ember-2); }
  .sb-head .stats {
    display: flex; gap: 14px; margin-top: 10px;
    font-size: 10.5px; font-family: var(--mono);
    color: var(--muted); letter-spacing: 0.04em;
  }
  .sb-head .stats b { color: var(--ink); font-weight: 600; font-family: var(--serif); font-size: 13px; letter-spacing: -0.01em; }
  .sb-pace {
    padding: 10px 20px; border-bottom: 1px solid var(--line);
    background: var(--bg-2);
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 10.5px; color: var(--muted);
    letter-spacing: 0.04em;
  }
  .sb-pace input[type=range] { flex: 1; accent-color: var(--ember); }
  .sb-pace .fin { font-family: var(--serif); font-size: 13px; color: var(--ink); letter-spacing: -0.01em; min-width: 76px; text-align: right; }

  .aid-list { padding: 0; }
  .aid-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 10px;
    padding: 9px 20px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background 0.12s;
    align-items: center;
  }
  .aid-row:hover { background: var(--bg-2); }
  .aid-row.active { background: #f4e8d0; border-left: 3px solid var(--ember); padding-left: 17px; }
  .aid-row .idx {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em;
  }
  .aid-row .name { font-family: var(--serif); font-size: 14.5px; letter-spacing: -0.01em; line-height: 1.1; }
  .aid-row .sub { font-family: var(--mono); font-size: 9.5px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }
  .aid-row .badge {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--paper);
    display: inline-block;
  }
  .aid-row .badge.crew { background: var(--crew); border-color: var(--crew); }
  .aid-row .badge.no { background: var(--paper); border-color: var(--line-soft); }
  .aid-row .badge.start { background: var(--ink); border-color: var(--ink); }
  .aid-row .badge.finish { background: var(--ember); border-color: var(--ember); }

  .right {
    display: grid;
    grid-template-rows: 1fr 240px;
    overflow: hidden;
  }
  #map { width: 100%; height: 100%; background: #e8dec6; }

  /* Soften the raster tiles to fit the warm paper palette */
  .base-tiles {
    filter: saturate(0.72) contrast(0.96) brightness(1.02) sepia(0.06);
  }

  /* Leaflet layer switcher — paper style */
  .leaflet-control-layers {
    border: 1px solid var(--line) !important;
    border-radius: 0 !important;
    background: var(--paper) !important;
    box-shadow: 3px 3px 0 rgba(42,31,23,0.12) !important;
    font-family: var(--mono) !important;
    font-size: 10.5px !important;
    letter-spacing: 0.04em !important;
  }
  .leaflet-control-layers-toggle {
    background-image: none !important;
    width: 30px !important; height: 30px !important;
    position: relative;
  }
  .leaflet-control-layers-toggle::after {
    content: "☰";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink); font-size: 14px;
  }
  .leaflet-control-layers-expanded {
    padding: 10px 12px !important;
    color: var(--ink) !important;
  }
  .leaflet-control-layers-expanded label {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 0; cursor: pointer;
  }
  .leaflet-control-layers-expanded input[type=radio] {
    accent-color: var(--ember);
  }
  .leaflet-control-layers-separator { display: none !important; }

  /* ===== Leaflet chrome tuned to paper aesthetic ===== */
  .leaflet-container {
    font-family: var(--mono);
    background: #e8dec6;
  }
  .leaflet-control-zoom {
    border: 1px solid var(--line) !important;
    box-shadow: 3px 3px 0 rgba(42,31,23,0.12) !important;
    border-radius: 0 !important;
    overflow: hidden;
  }
  .leaflet-control-zoom a {
    background: var(--paper) !important;
    color: var(--ink) !important;
    border-bottom: 1px solid var(--line-soft) !important;
    font-family: var(--serif) !important;
    font-size: 18px !important;
    line-height: 28px !important;
    width: 30px !important; height: 30px !important;
    border-radius: 0 !important;
  }
  .leaflet-control-zoom a:hover { background: #f4e8d0 !important; color: var(--ember) !important; }
  .leaflet-control-attribution {
    background: rgba(251, 246, 234, 0.82) !important;
    font-family: var(--mono) !important;
    font-size: 9.5px !important;
    color: var(--muted) !important;
    padding: 2px 6px !important;
    border-left: 1px solid var(--line-soft);
    border-top: 1px solid var(--line-soft);
  }
  .leaflet-control-attribution a { color: var(--ink-2) !important; }

  /* Popup restyle */
  .leaflet-popup-content-wrapper {
    background: var(--paper) !important;
    border: 1px solid var(--line) !important;
    border-radius: 0 !important;
    box-shadow: 4px 4px 0 rgba(42,31,23,0.15) !important;
    padding: 2px !important;
  }
  .leaflet-popup-content { margin: 10px 14px !important; font-family: var(--sans); }
  .leaflet-popup-tip { background: var(--paper) !important; border: 1px solid var(--line) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; font-size: 18px !important; padding: 4px 6px !important; }

  /* ===== Aid markers ===== */
  .aid-marker {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--paper);
    border: 2px solid var(--ink);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(42,31,23,0.32), 0 0 0 2px var(--paper);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: pointer;
    letter-spacing: 0;
  }
  .aid-marker:hover {
    transform: scale(1.18);
    z-index: 999 !important;
    box-shadow: 0 4px 10px rgba(42,31,23,0.4), 0 0 0 2px var(--paper);
  }
  .aid-marker.crew {
    background: var(--crew);
    color: var(--paper);
    border-color: var(--crew);
  }
  .aid-marker.nocrew { /* default, no-op */ }
  .aid-marker.start {
    width: 32px; height: 32px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--serif);
    font-size: 14px;
    border-color: var(--ink);
  }
  .aid-marker.finish {
    width: 32px; height: 32px;
    background: var(--ember);
    color: var(--paper);
    font-family: var(--serif);
    font-size: 14px;
    border-color: var(--ember);
    box-shadow: 0 0 0 3px var(--paper), 0 0 0 4px var(--ember), 0 4px 12px rgba(212,71,138,0.5);
  }
  .aid-marker.active {
    transform: scale(1.25);
    z-index: 999 !important;
    box-shadow: 0 0 0 3px var(--paper), 0 0 0 5px var(--ember), 0 4px 14px rgba(212,71,138,0.45);
  }

  /* Mile-tick markers along the route */
  .mile-tick {
    background: var(--paper);
    border: 1px solid var(--ink);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 9.5px;
    font-weight: 600;
    padding: 1px 5px;
    letter-spacing: 0.04em;
    white-space: nowrap;
    box-shadow: 1px 1px 0 rgba(42,31,23,0.2);
  }

  .elevation-panel {
    background: var(--paper);
    border-top: 1px solid var(--line);
    padding: 14px 20px 16px;
    position: relative;
    display: flex; flex-direction: column;
  }
  .elev-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .elev-header .t { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .elev-readout { font-family: var(--mono); font-size: 11.5px; color: var(--ink); }
  .elev-readout b { color: var(--ember-2); font-weight: 600; }
  #elevSvg { width: 100%; flex: 1; display: block; }

  /* Detail drawer */
  .drawer {
    position: absolute;
    top: 12px; right: 12px;
    width: 320px; max-width: calc(100% - 24px);
    background: var(--paper);
    border: 1px solid var(--line);
    box-shadow: 4px 4px 0 rgba(42,31,23,0.1);
    padding: 0;
    transform: translateX(calc(100% + 24px));
    transition: transform 0.32s cubic-bezier(0.2, 0.7, 0.1, 1);
    z-index: 999;
    max-height: calc(100% - 24px);
    overflow-y: auto;
  }
  .drawer.open { transform: translateX(0); }
  .drawer .close {
    position: absolute; top: 10px; right: 12px;
    background: transparent; border: 0; cursor: pointer;
    font-family: var(--serif); font-size: 22px; line-height: 1; color: var(--muted);
  }
  .drawer .close:hover { color: var(--ember); }
  .drawer-head { padding: 22px 24px 16px; border-bottom: 1px solid var(--line); }
  .drawer-head .tag { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .drawer-head h2 { font-family: var(--serif); font-weight: 500; font-size: 26px; margin: 6px 0 10px; letter-spacing: -0.015em; line-height: 1.05; }
  .drawer-head h2 em { font-style: italic; color: var(--ember-2); }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid var(--line-soft); }
  .stat-grid .s { padding: 12px 24px; border-right: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); }
  .stat-grid .s:nth-child(2n) { border-right: 0; }
  .stat-grid .s .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .stat-grid .s .v { font-family: var(--serif); font-size: 22px; letter-spacing: -0.01em; margin-top: 2px; }
  .stat-grid .s .v .u { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-left: 3px; }

  .drawer-body { padding: 18px 24px 24px; }
  .drawer-body h3 { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin: 14px 0 8px; font-weight: 500; }
  .drawer-body h3:first-child { margin-top: 0; }
  .drawer-body p { font-size: 13.5px; line-height: 1.55; margin: 0 0 10px; color: var(--ink-2); }
  .drawer-body .warn {
    background: #fce8f0;
    border: 1px solid var(--ember);
    padding: 10px 12px;
    font-size: 12.5px;
    color: var(--ember-2);
    font-family: var(--sans);
    line-height: 1.5;
    margin-top: 8px;
  }

  .seg-card {
    border: 1px solid var(--line-soft);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .seg-card .r1 { display: flex; justify-content: space-between; align-items: baseline; }
  .seg-card .r1 .nm { font-family: var(--serif); font-size: 15px; letter-spacing: -0.01em; }
  .seg-card .r1 .mi { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .seg-card .terr { font-size: 12.5px; color: var(--ink-2); margin-top: 6px; line-height: 1.5; }
  .seg-card .pill { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; padding: 2px 6px; margin-right: 4px; border: 1px solid var(--line-soft); color: var(--muted); }
  .seg-card .pill.up { color: var(--ember-2); border-color: var(--ember); }
  .seg-card .pill.dn { color: var(--sierra); border-color: var(--sierra); }

  /* Legend — compact inline strip */
  .legend {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(251, 246, 234, 0.92);
    border: 1px solid var(--line-soft);
    padding: 6px 10px;
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.06em;
    z-index: 998;
    display: flex; gap: 12px; align-items: center;
    color: var(--ink-2);
    backdrop-filter: blur(4px);
  }
  .legend .row { display: flex; align-items: center; gap: 5px; }
  .legend .sw {
    width: 9px; height: 9px; border: 1px solid var(--line);
    display: inline-block; flex-shrink: 0;
  }
  .legend .sw.route { width: 16px; height: 2px; background: var(--ember); border: 0; border-radius: 0; }
  .legend .sw.crew { background: var(--crew); border-radius: 50%; }
  .legend .sw.nocrew { background: var(--paper); border-radius: 50%; }
  .legend .sw.start { background: var(--ink); border-radius: 50%; }
  .legend .sw.fin { background: var(--ember); border-radius: 50%; }

  /* Scrubber marker */
  .scrub-marker {
    width: 14px; height: 14px;
    background: var(--ember);
    border: 2px solid var(--paper);
    border-radius: 50%;
    box-shadow: 0 0 0 1px var(--ink);
  }

  @media (max-width: 720px) {
    .page {
      grid-template-columns: 1fr;
      height: auto;
    }
    /* Map first on mobile (above the fold), then the list */
    .right { grid-template-rows: 58vh; height: 58vh; order: -1; }
    .sidebar { max-height: none; border-right: 0; border-top: 1px solid var(--line); }
    .sb-head { padding: 14px 16px 10px; }
    .sb-head h1 { font-size: 20px; }
    .sb-head .stats { gap: 10px; flex-wrap: wrap; font-size: 10px; }
    .sb-pace { padding: 8px 16px; }
    .aid-row { padding: 10px 16px; grid-template-columns: 20px 1fr auto; gap: 8px; }
    .aid-row.active { padding-left: 13px; }
    .elevation-panel { display: none; }

    /* Drawer becomes a bottom sheet */
    .drawer {
      top: auto; right: 0; left: 0;
      bottom: 0; width: 100%; max-width: 100%;
      max-height: 70vh;
      border-left: 0; border-right: 0; border-bottom: 0;
      border-top: 2px solid var(--line);
      transform: translateY(100%);
      box-shadow: 0 -4px 0 rgba(42,31,23,0.12);
    }
    .drawer.open { transform: translateY(0); }
    .drawer-head { padding: 18px 20px 14px; }
    .drawer-head h2 { font-size: 22px; }
    .drawer-body { padding: 16px 20px 24px; }
    .stat-grid .s { padding: 10px 20px; }
    .stat-grid .s .v { font-size: 18px; }

    .legend { display: none; }
    .leaflet-control-layers { font-size: 11px !important; }
    .leaflet-control-zoom a { width: 34px !important; height: 34px !important; line-height: 32px !important; font-size: 20px !important; }
  }
</style>
</head>
<body>

<header class="nav">
  <div class="brand"><span class="mark">Canyons · 100K · 2026</span></div>
  <nav>
    <a href="index.html" class="active">Route</a>
    <a href="nutrition.html">Nutrition</a>
    <a href="crew.html">Crew</a>
  </nav>
</header>

<div class="page">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="kicker">§ The Course</div>
      <h1>China Wall<br/>to <em>Auburn.</em></h1>
      <div class="stats" id="sbStats"></div>
    </div>
    <div class="sb-pace">
      <span>Finish target</span>
      <input type="range" id="paceSlider" min="14" max="20" step="0.5" value="17.5" />
      <span class="fin" id="paceReadout">17:30</span>
    </div>
    <div class="aid-list" id="aidList"></div>
  </aside>

  <div class="right">
    <div style="position: relative; overflow: hidden;">
      <div id="map"></div>
      <div class="legend">
        <div class="row"><span class="sw route"></span>Official alternate GPX</div>
        <div class="row"><span class="sw crew"></span>Crew-accessible</div>
        <div class="row"><span class="sw nocrew"></span>No crew</div>
        <div class="row"><span class="sw start"></span>Start</div>
        <div class="row"><span class="sw fin"></span>Finish</div>
      </div>
      <aside class="drawer" id="drawer">
        <button class="close" id="drawerClose">×</button>
        <div class="drawer-head" id="drawerHead"></div>
        <div class="stat-grid" id="drawerStats"></div>
        <div class="drawer-body" id="drawerBody"></div>
      </aside>
    </div>

    <div class="elevation-panel">
      <div class="elev-header">
        <div class="t">Elevation profile · hover to scrub</div>
        <div class="elev-readout" id="elevRead">— mi · — ft</div>
      </div>
      <svg id="elevSvg" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="assets/course-meta.js"></script>
<script>
(async () => {
  const course = await fetch('assets/course.json').then(r => r.json());
  const track = course.track;
  const aid = course.aid;
  const meta = course.meta;
  const CM = window.CANYONS;

  // === sidebar stats ===
  document.getElementById('sbStats').innerHTML = `
    <div><b>${meta.totalMi.toFixed(1)}</b> mi</div>
    <div><b>${meta.gainFt.toLocaleString()}</b> ft ↑</div>
    <div><b>${meta.lossFt.toLocaleString()}</b> ft ↓</div>
  `;

  // === sidebar aid list ===
  const list = document.getElementById('aidList');
  aid.forEach((a, i) => {
    const m = CM.aidMeta[a.name] || {};
    const short = CM.short[a.name] || a.name;
    let badge = 'no', badgeTxt = 'No crew';
    if (m.start) { badge = 'start'; badgeTxt = 'Start'; }
    else if (m.finish) { badge = 'finish'; badgeTxt = 'Finish'; }
    else if (m.crew) { badge = 'crew'; badgeTxt = 'Crew'; }
    else if (m.water) { badge = 'no'; badgeTxt = 'Water only'; }

    const row = document.createElement('div');
    row.className = 'aid-row';
    row.dataset.idx = i;
    row.innerHTML = `
      <div class="idx">${String(i).padStart(2,'0')}</div>
      <div>
        <div class="name">${short}</div>
        <div class="sub">${a.miles.toFixed(2)} MI · ${Math.round(a.ele_ft).toLocaleString()} FT</div>
      </div>
      <div class="badge ${badge}" title="${badgeTxt}"></div>
    `;
    row.addEventListener('click', () => selectAid(i));
    list.appendChild(row);
  });

  // === Leaflet map ===
  const map = L.map('map', {
    zoomControl: true,
    attributionControl: true,
    zoomSnap: 0.25,
    wheelPxPerZoomLevel: 100
  }).setView([39.05, -120.85], 10);

  // Base layers
  const esriTopo = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
    {
      maxZoom: 19,
      attribution: 'Tiles © Esri — Sources: Esri, USGS, NOAA',
      className: 'base-tiles'
    }
  );

  const esriImagery = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {
      maxZoom: 19,
      attribution: 'Imagery © Esri, Maxar, Earthstar Geographics'
    }
  );

  // Subtle hillshade overlay to bring out the canyon relief
  const hillshade = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}',
    {
      maxZoom: 19,
      opacity: 0.22,
      attribution: ''
    }
  );

  esriTopo.addTo(map);
  hillshade.addTo(map);

  // Layer control for base swap
  const baseLayers = {
    'Topo': esriTopo,
    'Satellite': esriImagery
  };
  L.control.layers(baseLayers, null, { position: 'topright', collapsed: true }).addTo(map);

  // Subtle paper tint overlay on the map
  const tint = L.rectangle([[-85,-180],[85,180]], {
    stroke: false, fillColor: '#fbf6ea', fillOpacity: 0.18, interactive: false
  }).addTo(map);

  // route line — dark halo + ember core + subtle outer glow
  const routeLatLngs = track.map(p => [p.lat, p.lon]);
  L.polyline(routeLatLngs, { color: '#fbf6ea', weight: 9, opacity: 0.55, lineCap: 'round', lineJoin: 'round' }).addTo(map);
  L.polyline(routeLatLngs, { color: '#3d2818', weight: 6, opacity: 0.85, lineCap: 'round', lineJoin: 'round' }).addTo(map);
  const route = L.polyline(routeLatLngs, { color: '#e6589a', weight: 3.2, opacity: 1, lineCap: 'round', lineJoin: 'round' }).addTo(map);
  map.fitBounds(route.getBounds(), { padding: [40, 40] });

  // aid markers
  const markers = [];
  aid.forEach((a, i) => {
    const m = CM.aidMeta[a.name] || {};
    let cls = 'aid-marker', txt = String(i);
    if (m.start) { cls += ' start'; txt = 'S'; }
    else if (m.finish) { cls += ' finish'; txt = 'F'; }
    else if (m.crew) cls += ' crew';

    const icon = L.divIcon({
      className: '',
      html: `<div class="${cls}">${txt}</div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 13]
    });
    const mk = L.marker([a.lat, a.lon], { icon }).addTo(map);
    const short = CM.short[a.name] || a.name;
    mk.bindPopup(`<b style="font-family: var(--serif); font-size: 15px;">${short}</b><br>
      <span style="font-family: var(--mono); font-size: 11px; color: #7a6a5a;">
      ${a.miles.toFixed(2)} mi · ${Math.round(a.ele_ft).toLocaleString()} ft
      </span>`);
    mk.on('click', () => selectAid(i));
    markers.push(mk);
  });

  // scrubber marker
  const scrubIcon = L.divIcon({ className: '', html: '<div class="scrub-marker"></div>', iconSize: [14,14], iconAnchor: [7,7] });
  const scrubMarker = L.marker([track[0].lat, track[0].lon], { icon: scrubIcon, interactive: false, opacity: 0 }).addTo(map);

  // === Elevation SVG ===
  const svg = document.getElementById('elevSvg');
  function drawElev() {
    const rect = svg.getBoundingClientRect();
    const W = rect.width, H = rect.height;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    const PAD_T = 12, PAD_B = 18, PAD_L = 8, PAD_R = 8;

    const elevs = track.map(p => p.ft);
    const maxD = track[track.length-1].m;
    const minE = Math.min(...elevs), maxE = Math.max(...elevs);
    const px = d => PAD_L + (d / maxD) * (W - PAD_L - PAD_R);
    const py = e => PAD_T + (1 - (e - minE) / (maxE - minE)) * (H - PAD_T - PAD_B);

    let path = '', fill = '';
    track.forEach((p, i) => { path += (i === 0 ? 'M' : 'L') + px(p.m).toFixed(1) + ',' + py(p.ft).toFixed(1) + ' '; });
    fill = path + `L${px(maxD).toFixed(1)},${H-PAD_B} L${px(0).toFixed(1)},${H-PAD_B} Z`;

    let ticks = '', labels = '';
    aid.forEach((a, i) => {
      const x = px(a.miles * 1609.34);
      const m = CM.aidMeta[a.name] || {};
      const col = m.start ? '#1b1410' : m.finish ? '#d4478a' : m.crew ? '#2e5d7a' : '#7a6a5a';
      ticks += `<line x1="${x}" y1="${PAD_T-2}" x2="${x}" y2="${H-PAD_B+4}" stroke="${col}" stroke-opacity="${m.crew || m.start || m.finish ? 0.55 : 0.25}" stroke-width="1"/>`;
      ticks += `<circle cx="${x}" cy="${py(a.ele_ft)}" r="3" fill="${col}" stroke="#fbf6ea" stroke-width="1.2"/>`;
      if (m.start || m.finish || m.crew) {
        labels += `<text x="${x}" y="${H-4}" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#4a3a2e">${a.miles.toFixed(0)}</text>`;
      }
    });

    svg.innerHTML = `
      <defs>
        <linearGradient id="elevFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#d4478a" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="#d4478a" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      <path d="${fill}" fill="url(#elevFill)" stroke="none"/>
      <path d="${path}" fill="none" stroke="#9e2a63" stroke-width="1.4"/>
      ${ticks}
      ${labels}
      <line id="scrubLine" x1="0" y1="${PAD_T}" x2="0" y2="${H-PAD_B}" stroke="#1b1410" stroke-width="1" stroke-dasharray="2 3" opacity="0"/>
    `;
    svg._state = { W, H, PAD_T, PAD_B, PAD_L, PAD_R, px, py, maxD, minE, maxE };
  }
  drawElev();
  window.addEventListener('resize', drawElev);

  // hover scrubbing
  const elevRead = document.getElementById('elevRead');
  svg.addEventListener('mousemove', (e) => {
    const s = svg._state; if (!s) return;
    const rect = svg.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const frac = Math.max(0, Math.min(1, (x - s.PAD_L) / (s.W - s.PAD_L - s.PAD_R)));
    const dTarget = frac * s.maxD;
    // binary search
    let lo = 0, hi = track.length - 1;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (track[mid].m < dTarget) lo = mid; else hi = mid;
    }
    const p = track[lo];
    const mi = (p.m / 1609.34).toFixed(2);
    elevRead.innerHTML = `<b>${mi}</b> mi · <b>${Math.round(p.ft).toLocaleString()}</b> ft`;
    const sl = svg.querySelector('#scrubLine');
    if (sl) {
      sl.setAttribute('x1', x); sl.setAttribute('x2', x);
      sl.setAttribute('opacity', 1);
    }
    scrubMarker.setLatLng([p.lat, p.lon]);
    scrubMarker.setOpacity(1);
  });
  svg.addEventListener('mouseleave', () => {
    const sl = svg.querySelector('#scrubLine'); if (sl) sl.setAttribute('opacity', 0);
    scrubMarker.setOpacity(0);
    elevRead.innerHTML = '— mi · — ft';
  });

  // === Selection / drawer ===
  const drawer = document.getElementById('drawer');
  const drawerHead = document.getElementById('drawerHead');
  const drawerStats = document.getElementById('drawerStats');
  const drawerBody = document.getElementById('drawerBody');
  document.getElementById('drawerClose').addEventListener('click', () => {
    drawer.classList.remove('open');
    document.querySelectorAll('.aid-row.active').forEach(r => r.classList.remove('active'));
  });

  function selectAid(i) {
    const a = aid[i];
    const m = CM.aidMeta[a.name] || {};
    const short = CM.short[a.name] || a.name;

    document.querySelectorAll('.aid-row').forEach(r => r.classList.toggle('active', +r.dataset.idx === i));
    document.querySelector(`.aid-row[data-idx="${i}"]`)?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    map.flyTo([a.lat, a.lon], 13, { duration: 0.7 });
    markers[i].openPopup();

    const prev = i > 0 ? aid[i-1] : null;
    const next = i < aid.length-1 ? aid[i+1] : null;
    const distFromPrev = prev ? (a.miles - prev.miles).toFixed(2) : '—';
    const distToNext = next ? (next.miles - a.miles).toFixed(2) : '—';

    // elevation in segment from prev -> a
    let segGain = 0, segLoss = 0;
    if (prev) {
      const i0 = track.findIndex(p => p.m >= prev.miles * 1609.34);
      const i1 = track.findIndex(p => p.m >= a.miles * 1609.34);
      for (let k = i0+1; k <= i1 && k < track.length; k++) {
        const d = track[k].ft - track[k-1].ft;
        if (d > 0) segGain += d; else segLoss -= d;
      }
    }

    let tag = 'Aid station';
    if (m.start) tag = 'Start';
    else if (m.finish) tag = 'Finish';
    else if (m.water) tag = 'Hydration only';
    if (m.crew) tag += ' · crew-accessible';

    drawerHead.innerHTML = `
      <div class="tag">${String(i).padStart(2,'0')} · ${tag}</div>
      <h2>${short.replace(/(Bluff|Bridge|Flat|Thumb|Wall|Auburn|Confluence)/, '<em>$1</em>')}</h2>
    `;

    drawerStats.innerHTML = `
      <div class="s"><div class="k">Course mile</div><div class="v">${a.miles.toFixed(2)}<span class="u">mi</span></div></div>
      <div class="s"><div class="k">Elevation</div><div class="v">${Math.round(a.ele_ft).toLocaleString()}<span class="u">ft</span></div></div>
      <div class="s"><div class="k">From prev</div><div class="v">${distFromPrev}<span class="u">mi</span></div></div>
      <div class="s"><div class="k">To next</div><div class="v">${distToNext}<span class="u">mi</span></div></div>
    `;

    let body = '';
    if (prev) {
      body += `<h3>Segment in</h3>
        <p style="font-family: var(--mono); font-size: 11.5px; color: var(--ink-2);">${CM.short[prev.name] || prev.name} → ${short} &nbsp; · &nbsp; +${Math.round(segGain).toLocaleString()} ft / −${Math.round(segLoss).toLocaleString()} ft</p>`;
      // find matching segment note
      const segNote = CM.segments.find(s => {
        const ps = CM.short[prev.name] || prev.name;
        const ss = short;
        return s.from === ps && s.to === ss;
      });
      if (segNote) body += `<p>${segNote.terrain}</p>`;
    }
    if (m.note) body += `<h3>Notes</h3><p>${m.note}</p>`;
    if (m.warning) body += `<div class="warn">⚠ ${m.warning}</div>`;
    if (m.parking) body += `<h3>Access</h3><p>${m.parking}</p>`;
    if (m.twice) body += `<p style="font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.04em;">▸ PASSED THROUGH TWICE</p>`;

    if (next) {
      const segNote = CM.segments.find(s => {
        const ss = short, ns = CM.short[next.name] || next.name;
        return s.from === ss && s.to === ns;
      });
      if (segNote) {
        body += `<h3>Next up</h3>
          <div class="seg-card">
            <div class="r1"><div class="nm">${CM.short[next.name] || next.name}</div><div class="mi">${distToNext} mi</div></div>
            <div class="terr">${segNote.terrain}</div>
          </div>`;
      }
    }
    drawerBody.innerHTML = body;
    drawer.classList.add('open');
  }
  // expose for hash-nav
  window._selectAid = selectAid;

  // === Finish target readout ===
  const slider = document.getElementById('paceSlider');
  const readout = document.getElementById('paceReadout');
  function updatePace() {
    const h = parseFloat(slider.value);
    const roundedTotalMin = Math.round(h * 60);
    const hh = Math.floor(roundedTotalMin / 60);
    const mm = roundedTotalMin % 60;
    readout.textContent = `${hh}:${String(mm).padStart(2,'0')}`;
  }
  slider.addEventListener('input', updatePace);
  updatePace();

  // default: open Foresthill (the crew HQ)

})();
</script>
</body>
</html>
